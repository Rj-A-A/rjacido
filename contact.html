<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roel</title>
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap Icons for hamburger -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  
  <!-- Font Awesome for X close button -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" sizes="32x32">
  <link rel="icon" type="image/png" href="favicon.png" sizes="192x192">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta name="msapplication-TileImage" content="favicon.png">
  <meta name="theme-color" content="#ffffff">
</head>

<body>
  
  <header>
    <h2 class="logo">Rj Acido</h2>

  </header>
  

<nav class="bottom-nav">
    <a href="index.html">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>

    <a href="about.html">
      <i class="fa-solid fa-circle-info"></i>
      <span>About</span>
    </a>

    <a href="download.html">
      <i class="fa-solid fa-download"></i>
      <span>Download</span>
    </a>

    <a href="contact.html">
      <i class="fa-solid fa-envelope"></i>
      <span>Contact</span>
    </a>
  </nav>

  <section class="contact-form">
    <h1>Contact Me</h1>
    
    <form id="contactForm">
      <label for="method">Choose Contact Method:</label>
      <select id="method" name="method">
        <option value="email">Email</option>
        <option value="telegram">Telegram</option>
      </select>

      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer>
    <p>© 2025 Roel Acido | All Rights Reserved</p>
  </footer>
  
   <script>
  const navLinks = document.querySelectorAll('.bottom-nav a');

const currentPage = window.location.pathname.split("/").pop();

navLinks.forEach(link => {
  const linkPage = link.getAttribute("href");
  
  // set active on load
  if (linkPage === currentPage || (currentPage === "" && linkPage === "index.html")) {
    link.classList.add("active");
  }
  
  // smooth instant switch on click
  link.addEventListener("click", function() {
    navLinks.forEach(l => l.classList.remove("active"));
    this.classList.add("active");
  });
});
  
  // Disable right-click keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'u') e.preventDefault();
    if (e.key === 'F12') e.preventDefault();
  });

  const form = document.getElementById('contactForm');
  const methodSelect = document.getElementById('method');
  const emailInput = form.elements['email'];
  const nameInput = form.elements['name'];
  const messageInput = form.elements['message'];

  // Toggle Email field based on contact method
  methodSelect.addEventListener('change', function() {
    if (this.value === 'telegram') {
      emailInput.style.display = 'none';
      emailInput.required = false;
    } else {
      emailInput.style.display = 'block';
      emailInput.required = true;
    }
  });

  // Handle form submit with validation and auto-clear
  form.addEventListener('submit', function(e) {
    e.preventDefault();


    const method = methodSelect.value;
    const name = nameInput.value.trim();
    const email = emailInput.value.trim();
    const message = messageInput.value.trim();

    if (method === 'email') {
      const mailtoLink = `mailto:acidorj24@gmail.com?subject=Contact from ${encodeURIComponent(name)}&body=${encodeURIComponent(message + "\n\nFrom: " + name + "\nEmail: " + email)}`;
      window.location.href = mailtoLink;
    } else if (method === 'telegram') {
      const telegramLink = `https://t.me/rjacido2k?text=${encodeURIComponent(message + "\n\nFrom: " + name)}`;
      window.open(telegramLink, '_blank');
    }

    // Auto-clear fields after submission
    nameInput.value = '';
    if (method === 'email') emailInput.value = '';
    messageInput.value = '';

    // Optional: Confirmation alert
    alert('Message is ready to be sent!');
  });
  
</script>

</body>
</html>
