<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">

  <meta name="google-site-verification" content="cywsguSI2nO8lhxtlb8TKMusx-ZB_tiM5xd7Aq-uQ78" />
  <meta name="description" content="Welcome to Roel Acido's official website. visit and download new updates and contact me for more information.">
  <meta name="keywords" content="Roel, Roel Acido">
  <meta name="author" content="Roel Acido">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="canonical" href="https://rjacido.netlify.app/">
  <meta name="robots" content="index, follow">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  
</head>

<body>

  <header>
    <h2 class="logo">Rj Acido</h2>

  </header>

  <nav class="bottom-nav">
    <a href="index.html">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>

    <a href="about.html">
      <i class="fa-solid fa-circle-info"></i>
      <span>About</span>
    </a>

    <a href="download.html">
      <i class="fa-solid fa-download"></i>
      <span>Download</span>
    </a>

    <a href="contact.html">
      <i class="fa-solid fa-envelope"></i>
      <span>Contact</span>
    </a>
  </nav>

  <section class="home-hero">
    <div class="hero-content">
      <h1>Roel Acido Official Website</h1>
      <h2>Click Download Button to Download Any apps</h2>
      <a href="download.html" class="btn-primary">Download</a>
    </div>
  </section>

  <footer>
    <p>© 2025 Roel Acido. All rights reserved.</p>
  </footer>

  <script>
  const navLinks = document.querySelectorAll('.bottom-nav a');

  const currentPage = window.location.pathname.split("/").pop();

  navLinks.forEach(link => {
    const linkPage = link.getAttribute("href");

    // set active on load
    if (linkPage === currentPage || (currentPage === "" && linkPage === "index.html")) {
      link.classList.add("active");
    }

    // smooth instant switch on click
    link.addEventListener("click", function () {
      navLinks.forEach(l => l.classList.remove("active"));
      this.classList.add("active");
    });
  });

    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'u') e.preventDefault();
      if (e.key === 'F12') e.preventDefault();
    });
    
  </script>

</body>
</html>
